<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas-KAIRØKOLLECTTIVE</title>
    <link rel="stylesheet" href="./css/adidas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type ="image/png" href="css/images/iconLogo2edited.png" sizes="16x16">
</head>
<body>
        <nav class="navbar">
            <div class="left-section">
                <div class="logo">
                    <img src="./css/images/Adidas/logo.jpg">
                </div>
            </div>
            
            <div class="middle-section">
                <div class="search-bar">
                    <input type="text" placeholder="Search a product...">
                    <div class="search-icon-placeholder">
                        <img src="./css/images/computer-icons-desktop-wallpaper-web-search-engine-wordpress-com-clip-art-png-search-download-icon-fc5c6aef7fd1319a8263dac456eb5c4a.png" alt="">
                    </div>
                </div>
            </div>
            
            <div class="right-section">
                <a href="signin.html" class="icon-placeholder" target="_blank" title="log In">
                    <i class="fa-solid fa-user"></i>
                </a>
                
                <a href="homePage.html" class="icon-placeholder" target="_blank" title="homePage">
                    <i class="fa-solid fa-house"></i>
                </a>
                
                <a href="cart.html" class="icon-placeholder" target="_blank" title="cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </div>
        </nav>

        <section>
        <div class="product">
            <div class="shirt product1">
                <img src="./css/images/Adidas/samba.jpg" alt="samba">
                <h2>samba</h2>
                <p> 10.499LE  <br>  <span>12500LE</span>  </p>
                <div class="layout product1">
                    <img src="./css/images/Adidas/samba1.jpg">
                </div>
            </div>


            <div class="shirt">
                <img src="./css/images/Adidas/real madrid.png" alt="real madrid">
                <h2>T-shirt real madrid</h2>
                <p>6.500 LE</p>
                <div class="layout">
                    <img src="./css/images/Adidas/real madrid1.png">
                </div>
            </div>


            <div class="shirt">
                <img src="./css/images/Adidas/hoodie.png">
                <h2>hoodie</h2>
                <p>6.249 LE</p>
                <div class="layout">
                    <img src="./css/images/Adidas/hoodie1.png">
                </div>
            </div>


            <div class="shirt">
                <img src="./css/images/Adidas/bag.png">
                <h2>Bag</h2>
                <p>2.100</p>
            </div>


            <div class="shirt">
                <img src="./css/images/Adidas/pp.png">
                <h2>Track Pants</h2>
                <p>4.999</p>
                </div>
            </div>


        </div>
    </section>
