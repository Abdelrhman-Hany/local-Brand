
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In-KAIRØ KOLLECTIVE</title> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/master.css">
  <link rel="icon" type ="image/png" href="css/images/iconLogo2edited.png" sizes="16x16">
<body>
  <section class="signup-main">
  <a id="SignupPAGE-logo" href="homePage.html" class="logo">KairØ Kollective .
  </a>
  <h1 class="createTEXT-signin-page">Login</h1>
<div>
  <form id="signinForm" novalidate method="post">
    <div id="signinError" class="error-msg"></div> 
    <div class="form-group">
    <label for="signin-email">Email</label>
    <input class="signup-page-boxes" id="signin-email" placeholder="Example@gmail.com" type="email" required>
    </div>
    <div class="form-group">
    <label for="signin-password">Password</label>
    <input class="signup-page-boxes" id="signin-password" placeholder="Password" type="password" required>
    </div>
    <div class="submit-button">
    <input type="submit" value="LOGIN">
    </div>
</form>
</div>
</section>
<script src="javascript/shop.js"></script>
</body>
</html>
