<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart - KAIRØ KOLLECTIVE</title>
    <link rel="stylesheet" href="css/master.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="icon" type ="image/png" href="css/images/iconLogo2edited.png" sizes="16x16">
</head>

<body>
    <header class="header">
        <a href="homePage.html" class="logo">KAIRØ KOLLECTIVE.</a>
    </header>
    <div class="cart-container">
        <h1>Your Cart</h1>
        <div id="cart-items"> 
        </div>
        <div class="cart-footer">
            <div class="summary">
                <p><strong>Estimated Total:</strong> <span id="total-price">LE 0.00</span></p>
                <small>Taxes, discounts, and shipping will be sent to your email when sending order.</small>
            </div>
            <button class="checkout" onclick="sendOrder()">Send Order</button>
          </div>
        <a href="shop.html" class="continue">Continue Shopping</a>
    </div>
    <script>
    function sendOrder() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        if (cart.length === 0) {
            alert("Your cart is empty. Please add items before sending the order.");
        } else {
            alert("Thank you for your order! We will send the details to your email shortly.");
            localStorage.removeItem("cart");
            location.reload(); }}
</script>
    
    <script>
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartItemsContainer = document.getElementById("cart-items");
        if (cart.length === 0) {
            cartItemsContainer.innerHTML = "<p>Your cart is empty.</p>";
        } else {
            let totalPrice = 0;
            cartItemsContainer.innerHTML = cart.map(item => {
                totalPrice += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="product">
                            <img src="${item.image}" alt="${item.name}" class="product-image">
                            <div class="product-info">
                                <h3 class="name">${item.name}</h3>
                                <p class="size">Size: ${item.size}</p>
                                <p class="price">Price: LE ${item.price}</p>
                                <p class="quantity">Quantity: ${item.quantity}</p>
                            </div>
                        </div>
                        <button class="delete" onclick="removeFromCart('${item.id}', '${item.size}')">🗑️ Remove</button>
                    </div>
                `;
            }).join('');
            document.getElementById("total-price").textContent = `LE ${totalPrice.toFixed(2)}`;
        }
        function removeFromCart(id, size) {
            const updatedCart = cart.filter(item => !(item.id === id && item.size === size));
            localStorage.setItem("cart", JSON.stringify(updatedCart));
            location.reload(); 
        }
    </script>
</body>

</html>
